<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dipendenti — Atlas Investimenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="shop.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="dipendenti.css">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Atlas" class="brand-logo" />
        <span class="brand-name">Atlas Investimenti</span>
      </a>
      <div class="nav-actions">
        <span class="role-pill" id="role-pill">—</span>
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='dashboard.html'">← Dashboard</button>
      </div>
    </div>
  </nav>

  <main class="shop-wrap">
    <div class="shop-header reveal">
      <div>
        <p class="eyebrow">Gestione</p>
        <h1 class="shop-username">Dipendenti</h1>
      </div>
      <button class="btn btn-primary btn-lg" id="btn-add-employee">
        <span>Crea credenziali</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div id="loading" class="loading-state">
      <div class="loading-spinner"></div>
      <p>Carichiamo il personale...</p>
    </div>

    <div id="empty" class="empty-state is-hidden">
      <div class="empty-icon">👥</div>
      <p>Nessun dipendente ancora registrato.</p>
    </div>

    <div id="employees-list" class="employees-list is-hidden"></div>
  </main>

  <div class="modal-overlay is-hidden" id="employee-modal">
    <form class="modal-card apply-card" id="employee-form">
      <button type="button" class="modal-close" id="employee-close">✕</button>
      <p class="eyebrow" id="employee-modal-eyebrow">Nuove credenziali</p>
      <h2 class="auth-title" style="font-size:1.6rem;" id="employee-modal-title">Crea Credenziali</h2>

      <label class="field-label">Nickname</label>
      <input class="input" type="text" id="employee-nickname" required />

      <label class="field-label">Password <span id="password-hint" class="hint-text"></span></label>
      <input class="input" type="password" id="employee-password" />

      <label class="field-label">@telegram</label>
      <input class="input" type="text" id="employee-telegram" placeholder="@username" required />

      <label class="field-label">Ruolo</label>
      <select class="input" id="employee-role" required></select>

      <p class="error-text is-hidden" id="employee-error"></p>

      <input type="hidden" id="employee-id" value="" />
      <button class="btn btn-primary btn-lg auth-full" type="submit" id="employee-submit">
        <span>Crea Credenziali</span>
        <span class="spinner is-hidden"></span>
      </button>
    </form>
  </div>

  <div class="modal-overlay is-hidden" id="delete-modal">
    <div class="modal-card" style="max-width:380px; text-align:center;">
      <div class="empty-icon" style="margin-bottom:1rem;">🗑️</div>
      <h2 class="auth-title" style="font-size:1.4rem;">Rimuovere il dipendente?</h2>
      <p class="auth-sub" id="delete-target-name">Questa azione non può essere annullata.</p>
      <div style="display:flex; gap:0.8rem;">
        <button class="btn btn-ghost auth-full" id="delete-cancel">Annulla</button>
        <button class="btn btn-primary auth-full" id="delete-confirm" style="background:linear-gradient(135deg,#e5484d,#a8282c);">Elimina</button>
      </div>
    </div>
  </div>

  <div class="toast is-hidden" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toast-message">Fatto!</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="dipendenti.js"></script>
</body>
</html>

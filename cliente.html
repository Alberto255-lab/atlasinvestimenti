<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area Clienti — Atlas Investimenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Atlas" class="brand-logo" />
        <span class="brand-name">Atlas Investimenti</span>
      </a>
      <div class="nav-actions">
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='index.html'">← Home</button>
      </div>
    </div>
  </nav>

  <main class="auth-wrap">
    <div class="auth-card reveal">

      <!-- STEP: scelta -->
      <div class="auth-step" id="step-choice">
        <p class="eyebrow">Area Clienti</p>
        <h1 class="auth-title">Bentornato</h1>
        <p class="auth-sub">Accedi al tuo profilo o crea un nuovo account per iniziare.</p>

        <button class="btn btn-primary btn-lg auth-full" id="go-login">
          <span>Ho già un account</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="btn btn-ghost btn-lg auth-full" id="go-register">Crea un account</button>
      </div>

      <!-- STEP: login -->
      <form class="auth-step is-hidden" id="step-login">
        <button type="button" class="back-btn" data-back>← Indietro</button>
        <p class="eyebrow">Login Cliente</p>
        <h1 class="auth-title">Bentornato</h1>

        <label class="field-label">Nickname</label>
        <input class="input" type="text" id="login-nickname" required autocomplete="username" />

        <label class="field-label">Password</label>
        <input class="input" type="password" id="login-password" required autocomplete="current-password" />

        <p class="error-text is-hidden" id="login-error"></p>

        <button class="btn btn-primary btn-lg auth-full" type="submit" id="login-submit">
          <span>Accedi</span>
          <span class="spinner is-hidden"></span>
        </button>
      </form>

      <!-- STEP: registrazione -->
      <form class="auth-step is-hidden" id="step-register">
        <button type="button" class="back-btn" data-back>← Indietro</button>
        <p class="eyebrow">Registrazione</p>
        <h1 class="auth-title">Crea il tuo account</h1>

        <label class="field-label">Nickname</label>
        <input class="input" type="text" id="reg-nickname" required autocomplete="username" />

        <label class="field-label">Telegram</label>
        <input class="input" type="text" id="reg-telegram" placeholder="@username" required />

        <label class="field-label">Password</label>
        <input class="input" type="password" id="reg-password" required autocomplete="new-password" minlength="6" />

        <p class="error-text is-hidden" id="register-error"></p>

        <button class="btn btn-primary btn-lg auth-full" type="submit" id="register-submit">
          <span>Registrati</span>
          <span class="spinner is-hidden"></span>
        </button>
      </form>

      <!-- STEP: successo -->
      <div class="auth-step is-hidden" id="step-success">
        <div class="success-icon">✓</div>
        <h1 class="auth-title">Fatto!</h1>
        <p class="auth-sub" id="success-message">Accesso effettuato, ti stiamo reindirizzando...</p>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="cliente.js"></script>
</body>
</html>

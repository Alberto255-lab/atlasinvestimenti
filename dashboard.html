<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Atlas Investimenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Atlas" class="brand-logo" />
        <span class="brand-name">Atlas Investimenti</span>
      </a>
      <div class="nav-actions">
        <span class="role-pill" id="role-pill">—</span>
        <button class="btn btn-ghost btn-sm" id="btn-logout">Esci</button>
      </div>
    </div>
  </nav>

  <main class="dash-wrap">
    <div class="dash-header reveal">
      <p class="eyebrow">Dashboard</p>
      <h1 class="dash-username" id="username-display">—</h1>
      <p class="dash-sub">Seleziona una sezione per iniziare a lavorare.</p>
    </div>

    <div class="menu-grid" id="menu-grid">
      <!-- popolato via JS in base al ruolo -->
    </div>

    <div class="dash-notice reveal">
      <span class="notice-icon">ℹ️</span>
      <p>Le sezioni verranno collegate una alla volta: al momento portano a pagine segnaposto.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>

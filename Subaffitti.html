<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subaffitti — Atlas Investimenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="shop.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="prodotti.css">
<link rel="stylesheet" href="subaffitti.css">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Atlas" class="brand-logo" />
        <span class="brand-name">Atlas Investimenti</span>
      </a>
      <div class="nav-actions">
        <span class="role-pill" id="role-pill">—</span>
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='dashboard.html'">← Dashboard</button>
      </div>
    </div>
  </nav>

  <main class="shop-wrap">
    <div class="shop-header reveal">
      <div>
        <p class="eyebrow">Gestione</p>
        <h1 class="shop-username">Subaffitti</h1>
      </div>
      <button class="btn btn-primary btn-lg" id="btn-add-apartment">
        <span>Aggiungi appartamento</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div id="loading" class="loading-state">
      <div class="loading-spinner"></div>
      <p>Carichiamo gli appartamenti...</p>
    </div>

    <div id="empty" class="empty-state is-hidden">
      <div class="empty-icon">🏠</div>
      <p>Nessun appartamento ancora creato.</p>
    </div>

    <div id="apartments-grid" class="apartments-grid is-hidden"></div>
  </main>

  <!-- ---------- Modale crea/modifica appartamento ---------- -->
  <div class="modal-overlay is-hidden" id="apartment-modal">
    <form class="modal-card apply-card" id="apartment-form">
      <button type="button" class="modal-close" id="apartment-close">✕</button>
      <p class="eyebrow" id="apartment-modal-eyebrow">Nuovo appartamento</p>
      <h2 class="auth-title" style="font-size:1.6rem;" id="apartment-modal-title">Aggiungi appartamento</h2>

      <label class="field-label">Nome appartamento</label>
      <input class="input" type="text" id="apt-name" required />

      <label class="field-label">Grandezza</label>
      <input class="input" type="text" id="apt-size" placeholder="es. 80mq, 3 stanze" required />

      <label class="field-label">Costo di affitto (€/settimana)</label>
      <input class="input" type="number" id="apt-cost" min="0" step="0.01" required />

      <label class="field-label">Coordinate</label>
      <input class="input" type="text" id="apt-coords" placeholder="es. X: 120, Y: -340" required />

      <p class="error-text is-hidden" id="apartment-error"></p>

      <input type="hidden" id="apartment-id" value="" />
      <button class="btn btn-primary btn-lg auth-full" type="submit" id="apartment-submit">
        <span>Crea appartamento</span>
        <span class="spinner is-hidden"></span>
      </button>
    </form>
  </div>

  <div class="modal-overlay is-hidden" id="delete-modal">
    <div class="modal-card" style="max-width:380px; text-align:center;">
      <div class="empty-icon" style="margin-bottom:1rem;">🗑️</div>
      <h2 class="auth-title" style="font-size:1.4rem;">Eliminare l'appartamento?</h2>
      <p class="auth-sub">Questa azione non può essere annullata.</p>
      <div style="display:flex; gap:0.8rem;">
        <button class="btn btn-ghost auth-full" id="delete-cancel">Annulla</button>
        <button class="btn btn-primary auth-full" id="delete-confirm" style="background:linear-gradient(135deg,#e5484d,#a8282c);">Elimina</button>
      </div>
    </div>
  </div>

  <div class="toast is-hidden" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toast-message">Fatto!</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="subaffitti.js"></script>
</body>
</html>

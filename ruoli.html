<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruoli — Atlas Investimenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="shop.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="dipendenti.css">
<link rel="stylesheet" href="ruoli.css">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Atlas" class="brand-logo" />
        <span class="brand-name">Atlas Investimenti</span>
      </a>
      <div class="nav-actions">
        <span class="role-pill" id="role-pill">—</span>
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='dashboard.html'">← Dashboard</button>
      </div>
    </div>
  </nav>

  <main class="shop-wrap">
    <div class="shop-header reveal">
      <div>
        <p class="eyebrow">Gestione</p>
        <h1 class="shop-username">Ruoli</h1>
      </div>
      <button class="btn btn-primary btn-lg" id="btn-add-role">
        <span>Crea ruolo</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div id="loading" class="loading-state">
      <div class="loading-spinner"></div>
      <p>Carichiamo i ruoli...</p>
    </div>

    <div id="roles-grid" class="roles-grid is-hidden"></div>
  </main>

  <!-- ---------- Modale crea ruolo ---------- -->
  <div class="modal-overlay is-hidden" id="role-modal">
    <form class="modal-card apply-card" id="role-form">
      <button type="button" class="modal-close" id="role-close">✕</button>
      <p class="eyebrow">Nuovo ruolo</p>
      <h2 class="auth-title" style="font-size:1.6rem;">Crea Ruolo</h2>

      <label class="field-label">Nome ruolo</label>
      <input class="input" type="text" id="role-name" placeholder="es. Grafico Senior" required />

      <p class="error-text is-hidden" id="role-error"></p>

      <button class="btn btn-primary btn-lg auth-full" type="submit" id="role-submit">
        <span>Crea ruolo</span>
        <span class="spinner is-hidden"></span>
      </button>
    </form>
  </div>

  <!-- ---------- Conferma eliminazione ---------- -->
  <div class="modal-overlay is-hidden" id="delete-modal">
    <div class="modal-card" style="max-width:380px; text-align:center;">
      <div class="empty-icon" style="margin-bottom:1rem;">🗑️</div>
      <h2 class="auth-title" style="font-size:1.4rem;">Eliminare il ruolo?</h2>
      <p class="auth-sub" id="delete-target-name">Questa azione non può essere annullata.</p>
      <div style="display:flex; gap:0.8rem;">
        <button class="btn btn-ghost auth-full" id="delete-cancel">Annulla</button>
        <button class="btn btn-primary auth-full" id="delete-confirm" style="background:linear-gradient(135deg,#e5484d,#a8282c);">Elimina</button>
      </div>
    </div>
  </div>

  <div class="toast is-hidden" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toast-message">Fatto!</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="ruoli.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prodotti — Atlas Investimenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
<link rel="stylesheet" href="shop.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="prodotti.css">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.jpg" alt="Atlas" class="brand-logo" />
        <span class="brand-name">Atlas Investimenti</span>
      </a>
      <div class="nav-actions">
        <span class="role-pill" id="role-pill">—</span>
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='dashboard.html'">← Dashboard</button>
      </div>
    </div>
  </nav>

  <main class="shop-wrap">
    <div class="shop-header reveal">
      <div>
        <p class="eyebrow">Gestione</p>
        <h1 class="shop-username">Prodotti</h1>
      </div>
      <button class="btn btn-primary btn-lg is-hidden" id="btn-add-product">
        <span>Aggiungi prodotto</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div id="products-loading" class="loading-state">
      <div class="loading-spinner"></div>
      <p>Carichiamo il catalogo...</p>
    </div>

    <div id="products-empty" class="empty-state is-hidden">
      <div class="empty-icon">📦</div>
      <p>Nessun prodotto ancora creato.</p>
    </div>

    <div class="products-grid is-hidden" id="products-grid"></div>
  </main>

  <div class="modal-overlay is-hidden" id="product-modal">
    <form class="modal-card apply-card" id="product-form">
      <button type="button" class="modal-close" id="product-close">✕</button>
      <p class="eyebrow" id="product-modal-eyebrow">Nuovo prodotto</p>
      <h2 class="auth-title" style="font-size:1.6rem;" id="product-modal-title">Aggiungi prodotto</h2>

      <label class="field-label">Immagine (URL)</label>
      <input class="input" type="url" id="product-image" placeholder="https://..." />

      <label class="field-label">Nome prodotto</label>
      <input class="input" type="text" id="product-name" required />

      <label class="field-label">Prezzo (€)</label>
      <input class="input" type="number" id="product-price" min="0" step="0.01" required />

      <label class="field-label">Catalogo (settore)</label>
      <select class="input" id="product-category" required>
        <option value="" disabled selected>Seleziona un settore</option>
        <option value="Investimenti">Investimenti</option>
        <option value="Edile">Edile</option>
        <option value="Informatica">Informatica</option>
        <option value="Grafica">Grafica</option>
        <option value="Legale">Legale</option>
        <option value="Editoriale">Editoriale</option>
      </select>

      <button type="button" class="btn btn-ghost auth-full" id="toggle-advanced" style="margin: 0.8rem 0;">⚙️ Impostazioni Avanzate</button>

      <div id="advanced-settings" class="is-hidden" style="border: 1px solid var(--line); border-radius: 12px; padding: 1.2rem; margin-bottom:1rem;">

        <label class="toggle-switch" style="margin-bottom:1rem;">
          <input type="checkbox" id="adv-requires-text" />
          <span class="toggle-track"></span>
          Casella di testo (richiedi input al cliente)
        </label>

        <div id="text-description-block" class="is-hidden">
          <label class="field-label">Descrizione casella di testo (placeholder invisibile)</label>
          <textarea class="input" id="adv-text-description" rows="4" placeholder="es. Scrivi qui il colore e la taglia desiderata..."></textarea>
        </div>

        <label class="toggle-switch">
          <input type="checkbox" id="adv-price-on-request" />
          <span class="toggle-track"></span>
          Prezzo da concordare (disabilita l'acquisto diretto)
        </label>
      </div>

      <p class="error-text is-hidden" id="product-error"></p>

      <input type="hidden" id="product-id" value="" />
      <button class="btn btn-primary btn-lg auth-full" type="submit" id="product-submit">
        <span>Crea prodotto</span>
        <span class="spinner is-hidden"></span>
      </button>
    </form>
  </div>

  <div class="modal-overlay is-hidden" id="delete-modal">
    <div class="modal-card" style="max-width:380px; text-align:center;">
      <div class="empty-icon" style="margin-bottom:1rem;">🗑️</div>
      <h2 class="auth-title" style="font-size:1.4rem;">Eliminare il prodotto?</h2>
      <p class="auth-sub">Questa azione non può essere annullata.</p>
      <div style="display:flex; gap:0.8rem;">
        <button class="btn btn-ghost auth-full" id="delete-cancel">Annulla</button>
        <button class="btn btn-primary auth-full" id="delete-confirm" style="background:linear-gradient(135deg,#e5484d,#a8282c);">Elimina</button>
      </div>
    </div>
  </div>

  <div class="toast is-hidden" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toast-message">Fatto!</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="prodotti.js"></script>
</body>
</html>
